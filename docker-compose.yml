services:
  codex-zai-proxy:
    build:
      context: .
      dockerfile: Containerfile
    container_name: codex-zai-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:4891:4891"
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4891/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
